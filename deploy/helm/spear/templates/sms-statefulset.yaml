{{- if .Values.sms.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "spear.sms.fullname" . }}
  labels:
    {{- include "spear.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "spear.sms.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "spear.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sms
  template:
    metadata:
      labels:
        {{- include "spear.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sms
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/sms-configmap.yaml") . | sha256sum }}
        {{- if .Values.sms.mcp.enabled }}
        checksum/mcp: {{ include (print $.Template.BasePath "/sms-mcp-configmap.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: sms
          image: "{{ include "spear.image.repository" (list . .Values.sms) }}:{{ include "spear.image.tag" (list . .Values.sms) }}"
          imagePullPolicy: {{ include "spear.image.pullPolicy" (list . .Values.sms) }}
          args:
            - sms
          env:
            - name: SPEAR_CONFIG
              value: /etc/sms/config.toml
            - name: HOME
              value: /tmp
            - name: SMS_FILES_DIR
              value: {{ .Values.sms.config.filesDir | quote }}
            - name: SMS_EXECUTION_LOGS_DIR
              value: {{ .Values.sms.config.executionLogsDir | quote }}
          {{- with .Values.sms.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.sms.service.grpcPort }}
            - name: http
              containerPort: {{ .Values.sms.service.httpPort }}
            - name: admin
              containerPort: {{ .Values.sms.service.adminPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/sms
              readOnly: true
            {{- if .Values.sms.mcp.enabled }}
            - name: mcp
              mountPath: /etc/sms/mcp.d
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: {{ .Values.sms.config.database.path }}
            - name: data
              mountPath: {{ .Values.sms.config.filesDir }}
            {{- if and (ne .Values.sms.config.executionLogsDir .Values.sms.config.filesDir) (ne .Values.sms.config.executionLogsDir .Values.sms.config.database.path) }}
            - name: data
              mountPath: {{ .Values.sms.config.executionLogsDir }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.sms.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "spear.sms.fullname" . }}
        {{- if .Values.sms.mcp.enabled }}
        - name: mcp
          configMap:
            name: {{ include "spear.sms.fullname" . }}-mcp
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if not .Values.sms.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.sms.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "spear.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.sms.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.sms.persistence.size }}
        {{- if .Values.sms.persistence.storageClass }}
        storageClassName: {{ .Values.sms.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}
{{- end -}}
