<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .frame { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .panel { fill: #f9fafb; stroke: #6b7280; stroke-width: 1.5; }
      .muted { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 1.5; }
      .chip { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.5; }
      .danger { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.5; }
      .t { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #111827; }
      .h { font-size: 18px; font-weight: 700; }
      .s { font-size: 13px; font-weight: 600; }
      .b { font-size: 12px; font-weight: 500; fill: #374151; }
      .m { font-size: 12px; font-weight: 400; fill: #4b5563; }
      .k { font-size: 11px; font-weight: 600; fill: #6b7280; letter-spacing: 0.04em; }
    </style>
  </defs>

  <rect x="20" y="20" width="1400" height="940" rx="16" class="frame"/>
  <text x="44" y="58" class="t h">SPEAR Console (Recommended Wireframe)</text>
  <text x="44" y="82" class="t m">Keep chat as the primary surface. Use a single Connect action in the drawer. The top bar only opens the drawer.</text>

  <rect x="44" y="110" width="1352" height="54" rx="10" class="panel"/>
  <text x="62" y="143" class="t s">SPEAR Console</text>
  <rect x="230" y="124" width="420" height="28" rx="14" class="chip"/>
  <text x="244" y="143" class="t b">Connection: Disconnected • Target: —</text>
  <rect x="1186" y="124" width="108" height="28" rx="8" class="muted"/>
  <text x="1206" y="143" class="t b">Select…</text>
  <rect x="1288" y="124" width="108" height="28" rx="8" class="muted"/>
  <text x="1308" y="143" class="t b">Disconnect</text>

  <rect x="44" y="176" width="900" height="760" rx="12" class="panel"/>
  <text x="66" y="206" class="t s">Chat</text>
  <text x="66" y="230" class="t m">Front-end user and back-end Agent interact here (unchanged).</text>

  <rect x="66" y="252" width="856" height="560" rx="10" class="muted"/>
  <text x="86" y="282" class="t k">MESSAGE HISTORY</text>
  <rect x="86" y="302" width="520" height="56" rx="10" class="panel"/>
  <text x="102" y="330" class="t b">User:</text>
  <text x="146" y="330" class="t m">Help me run task X with input Y</text>
  <rect x="356" y="372" width="566" height="70" rx="10" class="panel"/>
  <text x="372" y="402" class="t b">Agent:</text>
  <text x="426" y="402" class="t m">Sure. I will call endpoint / execution stream...</text>
  <rect x="86" y="462" width="520" height="56" rx="10" class="panel"/>
  <text x="102" y="490" class="t b">User:</text>
  <text x="146" y="490" class="t m">Show the last result and logs</text>

  <rect x="66" y="826" width="856" height="90" rx="10" class="panel"/>
  <text x="86" y="856" class="t k">COMPOSER</text>
  <rect x="86" y="866" width="684" height="36" rx="8" class="muted"/>
  <text x="100" y="889" class="t m">Type a message…</text>
  <rect x="784" y="866" width="138" height="36" rx="8" class="muted"/>
  <text x="824" y="889" class="t b">Send</text>

  <rect x="966" y="176" width="430" height="760" rx="12" class="panel"/>
  <text x="988" y="206" class="t s">Connect Drawer</text>
  <text x="988" y="230" class="t m">One drawer, two modes. Minimal fields, searchable lists.</text>

  <rect x="988" y="252" width="190" height="34" rx="10" class="muted"/>
  <text x="1010" y="274" class="t b">By Execution</text>
  <rect x="1188" y="252" width="208" height="34" rx="10" class="chip"/>
  <text x="1210" y="274" class="t b">By Endpoint (Gateway)</text>

  <text x="988" y="318" class="t k">ENDPOINT</text>
  <rect x="988" y="328" width="408" height="36" rx="8" class="muted"/>
  <text x="1002" y="351" class="t m">Search endpoint…</text>

  <rect x="988" y="378" width="408" height="170" rx="10" class="muted"/>
  <text x="1002" y="404" class="t k">RESULTS</text>
  <rect x="1002" y="418" width="380" height="34" rx="8" class="panel"/>
  <text x="1016" y="440" class="t b">echo</text>
  <text x="1100" y="440" class="t m">Task: Echo • Status: OK</text>
  <rect x="1002" y="458" width="380" height="34" rx="8" class="panel"/>
  <text x="1016" y="480" class="t b">asr_realtime</text>
  <text x="1132" y="480" class="t m">Task: ASR • Status: OK</text>
  <rect x="1002" y="498" width="380" height="34" rx="8" class="panel"/>
  <text x="1016" y="520" class="t b">image_caption</text>
  <text x="1134" y="520" class="t m">Task: CV • Status: OK</text>

  <text x="988" y="590" class="t k">CONNECTION DETAILS</text>
  <rect x="988" y="602" width="408" height="140" rx="10" class="muted"/>
  <text x="1002" y="628" class="t b">Target:</text>
  <text x="1060" y="628" class="t m">/e/echo/ws</text>
  <text x="1002" y="654" class="t b">Protocol:</text>
  <text x="1070" y="654" class="t m">ssf.v1 (binary WS)</text>
  <text x="1002" y="680" class="t b">Limits:</text>
  <text x="1058" y="680" class="t m">max_frame=4MiB, max_streams=1024</text>
  <text x="1002" y="706" class="t b">Last error:</text>
  <text x="1082" y="706" class="t m">—</text>

  <rect x="988" y="760" width="198" height="38" rx="10" class="chip"/>
  <text x="1050" y="784" class="t b">Connect</text>
  <rect x="1198" y="760" width="198" height="38" rx="10" class="muted"/>
  <text x="1255" y="784" class="t b">Cancel</text>

  <rect x="66" y="742" width="856" height="64" rx="10" class="danger"/>
  <text x="86" y="772" class="t b">Inline status (when needed):</text>
  <text x="270" y="772" class="t m">Rate limited / upstream overloaded / invalid protocol. Show short reason + request_id.</text>

  <text x="44" y="952" class="t m">Notes: Avoid extra pages. Keep selection in a single drawer. Keep connection chip always visible.</text>
</svg>
